<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인증 처리 중...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .container {
    text-align: center;
    padding: 40px;
  }
  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid #30363d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { font-size: 18px; font-weight: 500; color: #8b949e; margin-bottom: 8px; }
  p { font-size: 13px; color: #484f58; }
  .error {
    background: #1f0a0a;
    border: 1px solid #6e2626;
    border-radius: 8px;
    padding: 20px;
    color: #f85149;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
  .success {
    background: #0a1f0a;
    border: 1px solid #1a6e1a;
    border-radius: 8px;
    padding: 20px;
    color: #3fb950;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="container">
  <div class="spinner" id="spinner"></div>
  <h2 id="statusText">카페24 인증 처리 중...</h2>
  <p id="subText">잠시만 기다려주세요</p>
  <div class="error" id="errorBox"></div>
  <div class="success" id="successBox"></div>
</div>

<script>
const CONFIG = {
  CLIENT_ID: 'eCXgAY0UfUz4CEAjm6LNzL',
  CLIENT_SECRET: '6Su4aofoZSNSFXD9jmZ1MF',
  MALL_ID: 'gkstmdah1',
  REDIRECT_URI: 'https://litDIMS.github.io/cafe24/oauth-callback/',
};

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');

  if (error) {
    showError('인증이 거부되었습니다: ' + error);
    return;
  }

  if (!code) {
    showError('인증 코드가 없습니다. 다시 시도해주세요.');
    return;
  }

  // CSRF 검증
  const savedState = sessionStorage.getItem('oauth_state');
  if (state !== savedState) {
    showError('보안 검증 실패 (CSRF). 다시 시도해주세요.');
    return;
  }

  document.getElementById('subText').textContent = '액세스 토큰 발급 중...';

  try {
    // 액세스 토큰 교환 (CORS 우회: 프록시 필요 시 사용)
    // 카페24 토큰 엔드포인트는 CORS를 허용하지 않으므로
    // 실제 배포 시 백엔드 프록시 또는 Cloudflare Worker 필요
    // 여기서는 직접 시도하고, 실패 시 코드만 저장
    const credentials = btoa(`${CONFIG.CLIENT_ID}:${CONFIG.CLIENT_SECRET}`);
    const tokenUrl = `https://${CONFIG.MALL_ID}.cafe24api.com/api/v2/oauth/token`;

    let tokenData = null;

    try {
      const response = await fetch(tokenUrl, {
        method: 'POST',
        headers: {
          'Authorization': `Basic ${credentials}`,
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: new URLSearchParams({
          grant_type: 'authorization_code',
          code: code,
          redirect_uri: CONFIG.REDIRECT_URI,
        }),
      });

      if (response.ok) {
        tokenData = await response.json();
      }
    } catch (corsErr) {
      console.warn('직접 토큰 요청 실패 (CORS). 코드를 저장합니다.', corsErr);
    }

    if (tokenData && tokenData.access_token) {
      // 토큰 저장
      const tokenInfo = {
        access_token: tokenData.access_token,
        refresh_token: tokenData.refresh_token,
        expires_at: Date.now() + (tokenData.expires_in * 1000),
        issued_at: Date.now(),
        issue_count: (JSON.parse(localStorage.getItem('cafe24_token') || '{}').issue_count || 0) + 1,
        mall_id: CONFIG.MALL_ID,
        scopes: tokenData.scopes,
      };
      localStorage.setItem('cafe24_token', JSON.stringify(tokenInfo));
      localStorage.removeItem('pending_auth_code');

      showSuccess('✅ 인증 성공! 메인 화면으로 이동합니다.');
      setTimeout(() => {
        window.location.href = '../';
      }, 1500);
    } else {
      // CORS 문제로 직접 교환 불가 → 코드를 메인 페이지로 전달
      // (실제 운영환경에서는 백엔드 필요)
      const pendingData = {
        code: code,
        timestamp: Date.now(),
        state: state,
      };
      localStorage.setItem('pending_auth_code', JSON.stringify(pendingData));

      showSuccess('✅ 인증 코드 수신 완료. 메인 화면에서 토큰을 발급합니다.');
      setTimeout(() => {
        window.location.href = '../';
      }, 1500);
    }

  } catch (err) {
    showError('토큰 발급 중 오류: ' + err.message);
  }
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('statusText').textContent = '인증 실패';
  const errorBox = document.getElementById('errorBox');
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
  setTimeout(() => { window.location.href = '../'; }, 4000);
}

function showSuccess(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('statusText').textContent = '인증 완료';
  const successBox = document.getElementById('successBox');
  successBox.textContent = msg;
  successBox.style.display = 'block';
}

handleCallback();
</script>
</body>
</html>
