<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인증 처리 중...</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Noto Sans KR","Malgun Gothic",sans-serif; background:#0d1117; color:#e6edf3; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .box { text-align:center; padding:40px; }
  .spinner { width:48px; height:48px; border:3px solid #30363d; border-top-color:#58a6ff; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 24px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  h2 { font-size:18px; font-weight:500; color:#8b949e; margin-bottom:8px; }
  p { font-size:13px; color:#484f58; }
  .msg { border-radius:8px; padding:16px 20px; margin-top:16px; font-size:14px; display:none; }
  .success { background:#0a1f0a; border:1px solid #1a6e1a; color:#3fb950; }
  .error { background:#1f0a0a; border:1px solid #6e2626; color:#f85149; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <h2 id="statusText">카페24 인증 처리 중...</h2>
  <p id="subText">액세스 토큰을 발급하고 있습니다</p>
  <div class="msg success" id="successBox"></div>
  <div class="msg error" id="errorBox"></div>
</div>

<script>
const PROXY_URL = 'https://cafe24.zckyoqmu57.workers.dev';
const REDIRECT_URI = 'https://litDIMS.github.io/cafe24/oauth-callback/';
const TOKEN_DURATION_MS = 2 * 60 * 60 * 1000;

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const error = params.get('error');

  if (error) { showError('인증 거부: ' + error); return; }
  if (!code) { showError('인증 코드가 없습니다.'); return; }

  // CSRF 검증
  const savedState = sessionStorage.getItem('oauth_state');
  if (savedState && state !== savedState) {
    showError('보안 검증 실패(CSRF). 다시 시도해주세요.');
    return;
  }

  document.getElementById('subText').textContent = 'Worker를 통해 토큰 발급 중...';

  try {
    const res = await fetch(PROXY_URL + '/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });

    const data = await res.json();

    if (data.access_token) {
      // 기존 토큰의 issue_count 가져오기
      let prevCount = 0;
      try {
        const prev = JSON.parse(localStorage.getItem('cafe24_token') || '{}');
        prevCount = prev.issue_count || 0;
      } catch(e) {}

      const tokenInfo = {
        access_token: data.access_token,
        refresh_token: data.refresh_token || '',
        expires_at: Date.now() + (data.expires_in ? data.expires_in * 1000 : TOKEN_DURATION_MS),
        issued_at: Date.now(),
        issue_count: prevCount + 1,
        mall_id: 'gkstmdah1',
        scopes: data.scopes || '',
      };

      localStorage.setItem('cafe24_token', JSON.stringify(tokenInfo));
      sessionStorage.removeItem('oauth_state');

      showSuccess('✅ 인증 성공! 메인 화면으로 이동합니다...');
      setTimeout(() => { window.location.href = '../'; }, 1500);
    } else {
      showError('토큰 발급 실패: ' + (data.error_description || data.error || JSON.stringify(data)));
    }
  } catch(e) {
    showError('오류: ' + e.message);
  }
}

function showSuccess(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('statusText').textContent = '인증 완료';
  const el = document.getElementById('successBox');
  el.textContent = msg;
  el.style.display = 'block';
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('statusText').textContent = '인증 실패';
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { window.location.href = '../'; }, 4000);
}

handleCallback();
</script>
</body>
</html>
